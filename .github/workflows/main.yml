name: Run init after PR merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  run-init:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Update Engine
        shell: bash
        working-directory: automation/stage1
        run: |
          set -euo pipefail
          chmod +x fshoot.sh
          ./fshoot.sh
