{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dcm.fullname" . }}
  namespace: {{ include "dcm.namespace" . }}
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dcm.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingress.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.ingress.additionalFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.ports.app.port }}
        - protocol: TCP
          port: {{ .Values.service.ports.http.port }}
{{- end }}
